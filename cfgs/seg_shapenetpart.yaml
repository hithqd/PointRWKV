# PointRWKV Part Segmentation on ShapeNetPart

model_name: PointRWKVPartSeg

# Model architecture
model:
  embed_dim: 384
  depth: [4, 4, 4]
  num_heads: 8
  num_points: [2048, 1024, 512]
  group_sizes: [32, 32, 32]
  k_neighbors: [16, 8, 8]
  graph_iter: 3
  drop_path_rate: 0.1
  num_part_classes: 50
  num_shape_classes: 16

# Dataset
dataset:
  NAME: ShapeNetPart
  DATA_PATH: ./data/shapenetcore_partanno_segmentation_benchmark_v0_normal
  N_POINTS: 2048

# Training
epochs: 300
batch_size: 16
lr: 5e-4
weight_decay: 0.05
warmup_epochs: 10
val_freq: 1
save_freq: 50
